project_id = "nzemfi"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "262144000" # 250MB

[storage.buckets.audio]
public = false
file_size_limit = "262144000"
allowed_mime_types = ["audio/mpeg", "audio/flac", "audio/wav", "audio/aac", "audio/x-flac", "audio/mp4"]

[storage.buckets.covers]
public = true
file_size_limit = "10485760" # 10MB
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.avatars]
public = true
file_size_limit = "5242880" # 5MB
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://nzemfi.com", "nzemfi://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
template.invite.subject = "You've been invited to NzemFi"
template.confirmation.subject = "Confirm your NzemFi email"
template.recovery.subject = "Reset your NzemFi password"
template.email_change.subject = "NzemFi email change"

[auth.sms]
enable_signup = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_SECRET)"
redirect_uri = ""

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.update-halving]
verify_jwt = false

[functions.send-email]
verify_jwt = true

[analytics]
enabled = false
